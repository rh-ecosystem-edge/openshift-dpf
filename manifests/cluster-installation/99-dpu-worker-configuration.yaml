apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: <WORKER_ROLE>
  name: dpu-worker-configuration
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - contents:
            source: data:text/plain;charset=utf-8;base64,<BASE64_APPLY_NMSTATE_BRIDGE>
          mode: 0755
          overwrite: true
          path: /usr/local/bin/apply-nmstate-bridge.sh
        - contents:
            source: data:text/plain;charset=utf-8;base64,<BASE64_CONFIGURE_P0_ROUTING>
          mode: 0755
          overwrite: true
          path: /usr/local/bin/configure-p0-routing.sh
        - contents:
            source: data:text/plain;charset=utf-8;base64,<BASE64_UNMANAGE_OVNK_INTERFACE>
          mode: 0644
          overwrite: true
          path: "/etc/NetworkManager/conf.d/unmanage-ovnk-interface.conf"
        - contents:
            source: data:text/plain;charset=utf-8;base64,<BASE64_SET_OVNK_DPU_LABEL>
          mode: 0755
          overwrite: true
          path: /usr/local/bin/set-ovnk-dpu-label.sh
    systemd:
      units:
        - contents: |
            [Unit]
            Description=Apply NMState bridge configuration
            After=network.target NetworkManager.service nodeip-configuration.service nmstate.service
            Before=crio.service kubelet.service

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/apply-nmstate-bridge.sh <NODES_MTU>
            RemainAfterExit=yes
            TimeoutStartSec=150s
            Restart=on-failure
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
          enabled: true
          name: nmstate-bridge.service
        - name: set-ovnk-dpu-label.service
          enabled: true
          contents: |
            [Unit]
            Description=Set OVN-K DPU host label via CUSTOM_KUBELET_LABELS
            After=nodeip-configuration.service
            Before=kubelet-dependencies.target

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/set-ovnk-dpu-label.sh
            RemainAfterExit=yes

            [Install]
            RequiredBy=kubelet-dependencies.target
        - name: ovs-configuration.service
          enabled: false
        - name: openvswitch.service
          enabled: false
          mask: true
        - name: wait-for-br-ex-up.service
          enabled: false
        - name: p0-routing.service
          enabled: true
          contents: |
            [Unit]
            Description=Configure and maintain p0 interface routing
            After=kubelet.service network-online.target nmstate-bridge.service
            Wants=network-online.target

            [Service]
            Type=simple
            ExecStart=/usr/local/bin/configure-p0-routing.sh
            StandardOutput=journal
            StandardError=journal
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
